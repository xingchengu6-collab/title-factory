[build]
  command = "node scripts/generate-seo-pages.mjs"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/healthz"
  to = "/.netlify/functions/api/healthz"
  status = 200
