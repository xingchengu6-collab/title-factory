services:
  - type: web
    name: title-factory
    env: node
    plan: free
    buildCommand: node scripts/generate-seo-pages.mjs
    startCommand: node server.mjs
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SITE_URL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: gpt-4o-mini
      - key: AI_API_URL
        value: https://api.openai.com/v1/chat/completions
      - key: TEMPLATE_PACK_URL
        sync: false
      - key: PRO_CHECKOUT_URL
        sync: false
      - key: BUSINESS_LICENSE_URL
        sync: false
      - key: PURCHASE_INTENT_URL
        sync: false
