<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>标题工厂运营看板</title>
    <style>
      :root {
        --ink: #171717;
        --muted: #626262;
        --line: #dddddd;
        --paper: #ffffff;
        --mint: #dff4ea;
        --teal: #1e9c89;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #fbfaf7;
      }
      .shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
      header { padding: 28px 0 18px; border-bottom: 1px solid var(--line); background: #fff; }
      h1 { margin: 0; font-size: clamp(32px, 5vw, 54px); letter-spacing: 0; }
      .lead { color: var(--muted); line-height: 1.7; margin: 10px 0 0; }
      main { padding: 24px 0 56px; }
      .stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
      .stat, .panel {
        border: 1px solid var(--line);
        background: var(--paper);
        border-radius: 8px;
        padding: 16px;
      }
      .stat strong { display: block; font-size: 28px; }
      .stat span { color: var(--muted); font-size: 13px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 16px; }
      h2 { margin: 0 0 12px; font-size: 22px; }
      ol, table { width: 100%; }
      ol { display: grid; gap: 8px; padding-left: 20px; color: var(--muted); }
      li strong { color: var(--ink); }
      table { border-collapse: collapse; font-size: 14px; }
      th, td { border-top: 1px solid var(--line); padding: 10px 8px; text-align: left; vertical-align: top; }
      th { color: var(--muted); font-weight: 700; }
      .empty { color: var(--muted); line-height: 1.7; }
      .bar { display: inline-block; height: 8px; min-width: 8px; background: var(--teal); border-radius: 999px; margin-left: 8px; }
      @media (max-width: 900px) {
        .stats, .grid { grid-template-columns: 1fr 1fr; }
      }
      @media (max-width: 560px) {
        .stats, .grid { grid-template-columns: 1fr; }
        table { font-size: 13px; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="shell">
        <h1>标题工厂运营看板</h1>
        <p class="lead">从本地 CSV 读取事件和等待名单，用来判断哪些页面、行业和入口真正产生价值。</p>
      </div>
    </header>
    <main class="shell">
      <section class="stats" id="stats"></section>
      <section class="grid">
        <article class="panel">
          <h2>热门行业</h2>
          <ol id="topIndustries"></ol>
        </article>
        <article class="panel">
          <h2>热门页面</h2>
          <ol id="topPages"></ol>
        </article>
      </section>
      <section class="panel" style="margin-top: 16px;">
        <h2>最近事件</h2>
        <div id="recentEvents"></div>
      </section>
    </main>
    <script>
      const labels = {
        events: "事件总数",
        pageViews: "页面访问",
        generations: "生成次数",
        downloads: "下载点击",
        copies: "复制结果",
        waitlist: "等待名单",
      };

      function renderList(target, items) {
        target.innerHTML = items.length
          ? items.map((item) => `<li><strong>${item.name}</strong> · ${item.count}<span class="bar" style="width:${Math.min(160, item.count * 18)}px"></span></li>`).join("")
          : `<p class="empty">还没有数据。</p>`;
      }

      function renderRecent(target, items) {
        if (!items.length) {
          target.innerHTML = `<p class="empty">还没有事件记录。打开首页使用几次，就会看到数据。</p>`;
          return;
        }
        target.innerHTML = `<table>
          <thead><tr><th>时间</th><th>事件</th><th>页面</th><th>模式</th><th>行业</th><th>来源</th></tr></thead>
          <tbody>${items.map((item) => `<tr><td>${item.createdAt}</td><td>${item.name}</td><td>${item.page}</td><td>${item.mode}</td><td>${item.industry}</td><td>${item.source}</td></tr>`).join("")}</tbody>
        </table>`;
      }

      async function loadStats() {
        const response = await fetch("/api/stats");
        const data = await response.json();
        document.querySelector("#stats").innerHTML = Object.entries(labels)
          .map(([key, label]) => `<article class="stat"><strong>${data.totals[key]}</strong><span>${label}</span></article>`)
          .join("");
        renderList(document.querySelector("#topIndustries"), data.topIndustries);
        renderList(document.querySelector("#topPages"), data.topPages);
        renderRecent(document.querySelector("#recentEvents"), data.recentEvents);
      }

      loadStats().catch(() => {
        document.querySelector("#recentEvents").innerHTML = `<p class="empty">数据暂时不可用。</p>`;
      });
    </script>
  </body>
</html>
